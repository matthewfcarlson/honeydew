name: Lighthouse

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x

    - name: Install dependencies
      run: npm install

    - name: Build frontend
      run: npm run build

    - name: Inject mock auth data for logged-in view
      run: |
        mkdir -p dist/auth
        cat > dist/auth/check << 'AUTHEOF'
        window.logged_in = true;
        window.user_data = {
          name: "Test User",
          id: "U:00000000-0000-0000-0000-000000000000",
          color: "#88c0d0",
          icon: "fa-user",
          outfit_reminders: 0,
          household: {
            id: "H:00000000-0000-0000-0000-000000000000",
            name: "Test Household",
            auto_assign: null,
            outfit_hour: null,
            expecting: null,
            current_task: null,
            current_project: null,
            members: [{
              userid: "U:00000000-0000-0000-0000-000000000000",
              name: "Test User",
              color: "#88c0d0",
              icon: "fa-user",
              current_chore: { id: "C:00000000-0000-0000-0000-000000000000", name: "Test Chore", frequency: 7, household: "H:00000000-0000-0000-0000-000000000000", doneBy: null, doneDate: null, assignedTo: null, assignedDate: null, streak: 0 }
            }]
          }
        };
        AUTHEOF

    - name: Run Lighthouse CI
      id: lighthouse
      uses: treosh/lighthouse-ci-action@v12
      with:
        uploadArtifacts: true
        temporaryPublicStorage: true
        configPath: .lighthouserc.json

    - name: Format Lighthouse score
      if: github.event_name == 'pull_request'
      id: format
      uses: actions/github-script@v7
      with:
        script: |
          const results = ${{ steps.lighthouse.outputs.manifest }};
          const links = ${{ steps.lighthouse.outputs.links }};

          const entry = results[0];
          const summary = entry.summary;

          const score = (v) => `${Math.round(v * 100)}`;
          const emoji = (v) => v >= 0.9 ? '🟢' : v >= 0.5 ? '🟡' : '🔴';

          const body = [
            '## Lighthouse Report',
            '',
            '| Category | Score |',
            '|----------|-------|',
            `| ${emoji(summary.performance)} Performance | ${score(summary.performance)} |`,
            `| ${emoji(summary.accessibility)} Accessibility | ${score(summary.accessibility)} |`,
            `| ${emoji(summary['best-practices'])} Best Practices | ${score(summary['best-practices'])} |`,
            `| ${emoji(summary.seo)} SEO | ${score(summary.seo)} |`,
            '',
            `[Full Report](${Object.values(links)[0]})`,
          ].join('\n');

          core.setOutput('body', body);

    - name: Comment on PR with Lighthouse scores
      if: github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        header: lighthouse
        message: ${{ steps.format.outputs.body }}
